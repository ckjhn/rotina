<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Soft creamy dark background -->
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2c2a26"/>
      <stop offset="100%" stop-color="#16140f"/>
    </radialGradient>

    <!-- Warm pastel glow behind leaf -->
    <radialGradient id="leaf-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#e8c8a0" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#d4a87a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#16140f" stop-opacity="0"/>
    </radialGradient>

    <!-- Leaf fill gradient — creamy warm tones -->
    <linearGradient id="leaf-fill" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"   stop-color="#e8c8a0"/>
      <stop offset="45%"  stop-color="#d4a87a"/>
      <stop offset="100%" stop-color="#b8895a"/>
    </linearGradient>

    <!-- Subtle rim highlight -->
    <linearGradient id="leaf-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0dab8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c4945c" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Glow filter for leaf -->
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Warm ambient glow -->
  <circle cx="32" cy="32" r="32" fill="url(#leaf-glow)"/>

  <!-- Outer decorative ring (dashed, very subtle) -->
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="#d4a87a" stroke-width="0.4" stroke-opacity="0.18" stroke-dasharray="2 3.5"/>

  <!-- Inner ring (tighter) -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#e8c8a0" stroke-width="0.3" stroke-opacity="0.10"/>

  <!-- Cardinal ticks -->
  <line x1="32" y1="3"  x2="32" y2="6"  stroke="#d4a87a" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="32" y1="58" x2="32" y2="61" stroke="#d4a87a" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="3"  y1="32" x2="6"  y2="32" stroke="#d4a87a" stroke-width="0.7" stroke-opacity="0.35"/>
  <line x1="58" y1="32" x2="61" y2="32" stroke="#d4a87a" stroke-width="0.7" stroke-opacity="0.35"/>

  <!-- Tiny star dots in background -->
  <circle cx="10" cy="12" r="0.4" fill="#e8c8a0" fill-opacity="0.35"/>
  <circle cx="52" cy="9"  r="0.35" fill="#f0dab8" fill-opacity="0.3"/>
  <circle cx="56" cy="44" r="0.4" fill="#e8c8a0" fill-opacity="0.28"/>
  <circle cx="8"  cy="50" r="0.35" fill="#f0dab8" fill-opacity="0.25"/>
  <circle cx="55" cy="20" r="0.3" fill="#e8c8a0" fill-opacity="0.22"/>
  <circle cx="12" cy="42" r="0.3" fill="#f0dab8" fill-opacity="0.2"/>

  <!-- OAK LEAF — detailed lobed silhouette, centered, scaled to 64×64 grid -->
  <!-- Leaf occupies roughly y=8..54, x=14..50 -->
  <g filter="url(#soft-glow)">
    <path d="
      M32 52
      L29 49 C26 49, 23 47.5, 21.5 45
      C19 45, 17 43, 16.5 40.5
      C19 39.5, 21.5 40.5, 22 41
      C19 38, 17.5 35, 18.5 32
      C21 31, 23.5 33, 24 34
      C21.5 30.5, 21 27, 23 24.5
      C25.5 23.5, 27.5 26, 28 27.5
      C26.5 24, 26.5 20.5, 28.5 18
      C31 17, 32.5 20, 33 22
      L32 10
      L31 22
      C31.5 20, 33 17, 35.5 18
      C37.5 20.5, 37.5 24, 36 27.5
      C36.5 26, 38.5 23.5, 41 24.5
      C43 27, 42.5 30.5, 40 34
      C40.5 33, 43 31, 45.5 32
      C46.5 35, 45 38, 42 41
      C42.5 40.5, 45 39.5, 47.5 40.5
      C47 43, 45 45, 42.5 45
      C41 47.5, 38 49, 35 49 Z
    " fill="url(#leaf-fill)" stroke="url(#leaf-stroke)" stroke-width="0.55" stroke-linejoin="round"/>
  </g>

  <!-- Stem -->
  <rect x="31" y="52" width="2" height="8" rx="1" fill="#c4945c" opacity="0.85"/>

  <!-- Midrib (central vein) -->
  <line x1="32" y1="10" x2="32" y2="52" stroke="#f0dab8" stroke-width="0.6" stroke-opacity="0.55" stroke-linecap="round"/>

  <!-- Lateral veins — left side -->
  <line x1="32" y1="24" x2="26" y2="30" stroke="#f0dab8" stroke-width="0.35" stroke-opacity="0.42"/>
  <line x1="32" y1="32" x2="24" y2="39" stroke="#f0dab8" stroke-width="0.35" stroke-opacity="0.38"/>
  <line x1="32" y1="40" x2="22" y2="45" stroke="#f0dab8" stroke-width="0.3"  stroke-opacity="0.32"/>

  <!-- Lateral veins — right side -->
  <line x1="32" y1="24" x2="38" y2="30" stroke="#f0dab8" stroke-width="0.35" stroke-opacity="0.42"/>
  <line x1="32" y1="32" x2="40" y2="39" stroke="#f0dab8" stroke-width="0.35" stroke-opacity="0.38"/>
  <line x1="32" y1="40" x2="42" y2="45" stroke="#f0dab8" stroke-width="0.3"  stroke-opacity="0.32"/>
</svg>
