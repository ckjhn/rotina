      </div>

        <div class="nav-section-label">Tracker</div>

          <span>Calendar</span>
        </div>

          <span>Habit Control</span>
        </div>

          <span class="nav-icon">⚡</span>

        <div class="nav-item" data-page="studies-dash">

        <div class="nav-item" data-page="comparison">

          <span>Observations</span>

          <span>AI Insights</span>
