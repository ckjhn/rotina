<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Dashboard — Activity & Study Tracker</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-container">
    
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">System v1.1</div>
        <div class="sidebar-title">Life Dashboard</div>
      </div>
      
      <nav class="sidebar-nav">
        <div class="nav-section-label">Tracker</div>
        <div class="nav-item active" data-page="today">
          <span class="nav-icon">📋</span>
          <span>Daily Tracker</span>
        </div>
        
        <div class="nav-section-label">Goals</div>
        <div class="nav-item" data-page="goals">
          <span class="nav-icon">🎯</span>
          <span>Goals & Objectives</span>
        </div>
        
        <div class="nav-section-label">Dashboards</div>
        <div class="nav-item" data-page="activities-dash">
          <span class="nav-icon">⚡</span>
          <span>Activities</span>
        </div>
        <div class="nav-item" data-page="studies-dash">
          <span class="nav-icon">📚</span>
          <span>Studies</span>
        </div>
        <div class="nav-item" data-page="comparison">
          <span class="nav-icon">⚖️</span>
          <span>Comparison</span>
        </div>
        
        <div class="nav-section-label">Analysis</div>
        <div class="nav-item" data-page="observations">
          <span class="nav-icon">🔎</span>
          <span>Observations</span>
        </div>
        <div class="nav-item" data-page="insights">
          <span class="nav-icon">🧠</span>
          <span>AI Insights</span>
        </div>
        <div class="nav-item" data-page="history">
          <span class="nav-icon">📜</span>
          <span>History</span>
        </div>
      </nav>
      
      <div class="sidebar-footer">
        <div class="nav-item" data-page="settings">
          <span class="nav-icon">⚙️</span>
          <span>Configuration</span>
        </div>
        <div class="nav-item" data-page="data">
          <span class="nav-icon">💾</span>
          <span>Data Management</span>
        </div>
      </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">
      
      <!-- Top Bar -->
      <header class="top-bar">
        <div class="top-bar-left">
          <button class="btn btn-icon mobile-menu-btn" onclick="toggleSidebar()">☰</button>
          <h1 class="page-title" id="page-title">Daily Tracker</h1>
        </div>
        <div class="top-bar-right">
          <span class="date-display" id="current-date-display"></span>
        </div>
      </header>

      <!-- Page Content -->
      <div class="page-content">
        <section class="page-section active" id="page-today"></section>
        <section class="page-section" id="page-goals"></section>
        <section class="page-section" id="page-activities-dash"></section>
        <section class="page-section" id="page-studies-dash"></section>
        <section class="page-section" id="page-comparison"></section>
        <section class="page-section" id="page-history"></section>
        <section class="page-section" id="page-observations"></section>
        <section class="page-section" id="page-insights"></section>
        <section class="page-section" id="page-settings"></section>
        <section class="page-section" id="page-data"></section>
      </div>
    </main>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-container"></div>
  </div>

  <!-- App Script -->
  <script src="assets/app.js"></script>
</body>
</html>
