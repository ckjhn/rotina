<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Deep space background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1e28"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </radialGradient>

    <!-- Teal glow for the eye/universe center -->
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="1"/>
      <stop offset="60%" stop-color="#2aa09a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a0c10" stop-opacity="0"/>
    </radialGradient>

    <!-- Iris gradient -->
    <radialGradient id="iris" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6cddd6"/>
      <stop offset="40%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#1a6b67"/>
    </radialGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#4ecdc4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Clip for inner circle -->
    <clipPath id="inner-clip">
      <circle cx="32" cy="32" r="22"/>
    </clipPath>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for pupil -->
    <filter id="strong-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Outer orbital ring (universe) -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#ring-grad)" stroke-width="0.6" stroke-dasharray="2 3"/>

  <!-- Second orbital ring, tilted (planet orbit feel) -->
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="none" stroke="#4ecdc4" stroke-width="0.4" stroke-opacity="0.25" transform="rotate(-30 32 32)"/>

  <!-- Stars scattered in background -->
  <circle cx="10" cy="14" r="0.5" fill="#4ecdc4" fill-opacity="0.7"/>
  <circle cx="52" cy="10" r="0.4" fill="#4ecdc4" fill-opacity="0.5"/>
  <circle cx="57" cy="44" r="0.6" fill="#4ecdc4" fill-opacity="0.6"/>
  <circle cx="8"  cy="50" r="0.4" fill="#4ecdc4" fill-opacity="0.4"/>
  <circle cx="20" cy="7"  r="0.35" fill="#e8eaf0" fill-opacity="0.4"/>
  <circle cx="45" cy="55" r="0.4" fill="#e8eaf0" fill-opacity="0.35"/>
  <circle cx="6"  cy="32" r="0.3" fill="#e8eaf0" fill-opacity="0.3"/>
  <circle cx="58" cy="26" r="0.35" fill="#4ecdc4" fill-opacity="0.4"/>

  <!-- Book base (bottom half of inner circle, two pages) -->
  <g clip-path="url(#inner-clip)">
    <!-- Left page -->
    <path d="M10 42 Q10 52 32 54 L32 36 Q22 34 10 36 Z" fill="#151923" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- Right page -->
    <path d="M54 42 Q54 52 32 54 L32 36 Q42 34 54 36 Z" fill="#12151c" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.5"/>
    <!-- Spine line -->
    <line x1="32" y1="36" x2="32" y2="54" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.6"/>
    <!-- Faint lines on pages (text suggestion) -->
    <line x1="15" y1="43" x2="29" y2="43" stroke="#4ecdc4" stroke-width="0.3" stroke-opacity="0.3"/>
    <line x1="14" y1="46" x2="28" y2="46" stroke="#4ecdc4" stroke-width="0.3" stroke-opacity="0.3"/>
    <line x1="35" y1="43" x2="49" y2="43" stroke="#4ecdc4" stroke-width="0.3" stroke-opacity="0.3"/>
    <line x1="35" y1="46" x2="48" y2="46" stroke="#4ecdc4" stroke-width="0.3" stroke-opacity="0.3"/>
  </g>

  <!-- Eye / Universe center -->
  <!-- Outer eye shape (almond) -->
  <path d="M16 32 Q24 22 32 22 Q40 22 48 32 Q40 42 32 42 Q24 42 16 32 Z"
        fill="#0e1118" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.6" filter="url(#glow)"/>

  <!-- Iris -->
  <circle cx="32" cy="32" r="8.5" fill="url(#iris)"/>

  <!-- Iris detail rings -->
  <circle cx="32" cy="32" r="8.5" fill="none" stroke="#2aa09a" stroke-width="0.4" stroke-dasharray="1.5 2"/>
  <circle cx="32" cy="32" r="6.5" fill="none" stroke="#4ecdc4" stroke-width="0.3" stroke-opacity="0.4"/>

  <!-- Pupil (dark with teal center — the infinite) -->
  <circle cx="32" cy="32" r="4" fill="#060810"/>
  <circle cx="32" cy="32" r="2.5" fill="#4ecdc4" filter="url(#strong-glow)"/>
  <circle cx="32" cy="32" r="1.2" fill="#e8f8f7"/>

  <!-- Highlight reflection in eye -->
  <circle cx="35" cy="29" r="1.2" fill="white" fill-opacity="0.35"/>

  <!-- Outer decorative ring with tick marks (compass/universe) -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Cardinal ticks -->
  <line x1="32" y1="8"  x2="32" y2="11" stroke="#4ecdc4" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="32" y1="53" x2="32" y2="56" stroke="#4ecdc4" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="8"  y1="32" x2="11" y2="32" stroke="#4ecdc4" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="53" y1="32" x2="56" y2="32" stroke="#4ecdc4" stroke-width="1" stroke-opacity="0.5"/>
</svg>
